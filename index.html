<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>WOJ - World of Jack</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--purple:#7C3AED;--teal:#0D9488;--green:#16A34A;--blue:#2563EB;
--amber:#D97706;--coral:#EA580C;--pink:#DB2777;--cyan:#0891B2;
--red:#DC2626;--gray:#6B7280;--lime:#65A30D;
}
[data-t=dark]{--bg:#0b0b10;--surf:#12121a;--elev:#181822;--hov:#1e1e2a;--brd:rgba(255,255,255,.07);--brd2:rgba(255,255,255,.13);--tx:#efeffa;--tx2:#8888a8;--tx3:#48485e}
[data-t=light]{--bg:#eeeef5;--surf:#fff;--elev:#f5f5fa;--hov:#ebebf5;--brd:rgba(0,0,0,.07);--brd2:rgba(0,0,0,.13);--tx:#0e0e18;--tx2:#48486a;--tx3:#8888a8}
html,body{height:100%;font-family:system-ui,-apple-system,sans-serif;font-size:13px;background:var(--bg);color:var(--tx);transition:background .2s,color .2s}
.app{display:flex;height:100vh;overflow:hidden}
.sb{width:52px;background:var(--surf);border-right:1px solid var(--brd);display:flex;flex-direction:column;align-items:center;padding:10px 0 12px;gap:1px;flex-shrink:0;transition:width .22s ease;overflow:hidden;z-index:20}
.sb.open{width:210px;align-items:flex-start}
.sb-logo{display:flex;align-items:center;gap:10px;padding:0 9px;margin-bottom:12px;cursor:pointer;flex-shrink:0;width:100%}
.sb-logo-box{width:34px;height:34px;border-radius:10px;background:var(--purple);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:12px;flex-shrink:0}
.sb-logo-name{font-size:14px;font-weight:800;color:var(--tx);white-space:nowrap;opacity:0;transition:opacity .15s}
.sb.open .sb-logo-name{opacity:1}
.sb-toggle{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;background:none;color:var(--tx3);transition:all .15s;flex-shrink:0;margin-bottom:4px;align-self:center}
.sb-toggle:hover{background:var(--hov);color:var(--tx2)}
.sb-toggle svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;transition:transform .22s}
.sb.open .sb-toggle svg{transform:rotate(180deg)}
.sb-section{width:100%;padding:0 7px}
.sb-lbl{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);padding:6px 5px 3px;white-space:nowrap;opacity:0;height:0;overflow:hidden;transition:opacity .15s}
.sb.open .sb-lbl{opacity:1;height:auto}
.sb-div{width:calc(100% - 14px);height:1px;background:var(--brd);margin:5px 7px}
.nb{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx3);border:none;background:none;transition:all .15s;position:relative;flex-shrink:0}
.sb.open .nb{width:100%;height:34px;justify-content:flex-start;padding:0 7px;gap:9px;border-radius:8px}
.nb:hover{background:var(--hov);color:var(--tx2)}
.nb.on{background:rgba(124,58,237,.12);color:var(--purple)}
.nb svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.nb-lbl{font-size:12px;font-weight:500;white-space:nowrap;opacity:0;transition:opacity .15s}
.sb.open .nb-lbl{opacity:1}
.nb-dot{position:absolute;top:6px;right:6px;width:6px;height:6px;border-radius:50%;background:var(--red);border:2px solid var(--surf)}
.sb.open .nb-dot{top:8px;right:8px}
.sp{flex:1}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:50px;background:var(--surf);border-bottom:1px solid var(--brd);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
.tb-title{font-weight:700;font-size:14px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-date{font-size:11px;color:var(--tx3);white-space:nowrap}
.vtog{display:flex;background:var(--elev);border:1px solid var(--brd);border-radius:8px;padding:2px;gap:2px;flex-shrink:0}
.vb{font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;color:var(--tx3);cursor:pointer;border:none;background:none;transition:all .15s}
.vb.on{background:var(--purple);color:#fff}
.thm{width:30px;height:30px;border-radius:7px;border:1px solid var(--brd2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2);background:none;flex-shrink:0}
.thm:hover{background:var(--hov)}
.thm svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round}
.av{width:30px;height:30px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:800;flex-shrink:0}
.g-alert{background:rgba(220,38,38,.1);border-bottom:1px solid rgba(220,38,38,.2);padding:8px 16px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--red);font-weight:500;flex-shrink:0}
.g-alert a{color:var(--red);text-decoration:underline;cursor:pointer;font-weight:700}
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 18px}
.content.np{padding:0;overflow:hidden;display:flex;flex-direction:column}
.tile{background:var(--surf);border:1px solid var(--brd);border-radius:13px;padding:15px 16px;margin-bottom:11px}
.tile:hover{border-color:var(--brd2)}
.th{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.tlbl{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--tx3)}
.ta{font-size:11px;color:var(--purple);cursor:pointer;font-weight:600}
.ta:hover{opacity:.8}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;margin-bottom:11px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:11px;margin-bottom:11px}
.s2{grid-column:span 2}.s3{grid-column:span 3}.s4{grid-column:span 4}
.aib{background:var(--surf);border:1px solid var(--brd);border-radius:13px;padding:15px 16px;margin-bottom:11px;position:relative;overflow:hidden}
.aib::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#7C3AED,#0D9488,#0891B2)}
.aih{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.puls{width:8px;height:8px;border-radius:50%;background:var(--purple);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.75)}}
.ailbl{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--purple)}
.ait{font-size:11px;color:var(--tx3);margin-left:auto}
.aitext{font-size:12px;color:var(--tx2);line-height:1.7}
.chips{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap}
.chip{font-size:11px;padding:5px 11px;border-radius:20px;border:1px solid var(--brd2);color:var(--tx2);cursor:pointer;background:var(--elev);transition:all .15s;white-space:nowrap}
.chip:hover{border-color:var(--purple);color:var(--purple)}
.btn-p{padding:8px 18px;background:var(--purple);color:#fff;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:opacity .15s;font-family:inherit}
.btn-p:hover{opacity:.9}
.btn-s{padding:8px 16px;background:var(--elev);color:var(--tx2);border:1px solid var(--brd2);border-radius:9px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-s:hover{background:var(--hov)}
.btn-r{padding:8px 16px;background:rgba(220,38,38,.12);color:var(--red);border:1px solid rgba(220,38,38,.25);border-radius:9px;font-size:12px;cursor:pointer;font-family:inherit}
.abtn{font-size:11px;font-weight:500;padding:5px 11px;border-radius:7px;cursor:pointer;border:1px solid;transition:all .15s;white-space:nowrap;font-family:inherit}
.abtn.p{background:var(--purple);color:#fff;border-color:var(--purple)}
.abtn.r{background:var(--red);color:#fff;border-color:var(--red)}
.abtn.s{background:transparent;color:var(--tx2);border-color:var(--brd2)}
.abtn:hover{opacity:.85}
.minput{width:100%;padding:9px 12px;background:var(--elev);border:1px solid var(--brd2);border-radius:9px;color:var(--tx);font-size:12px;outline:none;transition:border-color .15s;font-family:inherit}
.minput:focus{border-color:var(--purple)}
.msel{width:100%;padding:9px 12px;background:var(--elev);border:1px solid var(--brd2);border-radius:9px;color:var(--tx);font-size:12px;outline:none;font-family:inherit}
.mlbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--tx3);margin-bottom:5px}
.mfield{margin-bottom:12px}
.m2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px;white-space:nowrap;display:inline-block}
.tasks{display:flex;flex-direction:column;gap:2px}
.ti{display:flex;align-items:flex-start;gap:9px;padding:8px 9px;border-radius:9px;cursor:pointer;border:1px solid transparent;transition:all .12s}
.ti:hover{background:var(--hov);border-color:var(--brd)}
.chk{width:17px;height:17px;border-radius:5px;border:1.5px solid var(--brd2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.chk.done{background:var(--green);border-color:var(--green)}
.chk.done::after{content:'';width:8px;height:5px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px);display:block}
.ti-text{font-size:12px;color:var(--tx);flex:1;line-height:1.4}
.ti-text.done{text-decoration:line-through;color:var(--tx3)}
.ti-meta{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.si{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;background:var(--elev);border:1px solid var(--brd);cursor:pointer;transition:all .15s}
.si:hover{border-color:var(--brd2);transform:translateX(2px)}
.si-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.week-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.wd{border-radius:11px;padding:9px 4px;border:1px solid var(--brd);background:var(--elev);cursor:pointer;text-align:center;transition:all .15s}
.wd:hover,.wd.today{border-color:var(--purple);background:rgba(124,58,237,.1)}
.wd-name{font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em}
.wd-num{font-size:17px;font-weight:800;color:var(--tx);margin:2px 0}
.wd.today .wd-num{color:var(--purple)}
.wd-dots{display:flex;gap:2px;justify-content:center;margin-top:3px;min-height:6px}
.wdot{width:5px;height:5px;border-radius:50%}
.sc{background:var(--elev);border-radius:10px;padding:12px 14px;border:1px solid var(--brd)}
.sv{font-size:26px;font-weight:800;line-height:1}
.sl{font-size:10px;color:var(--tx3);margin-top:3px;font-weight:500}
.dec{background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.2);border-radius:13px;padding:15px 16px;margin-bottom:11px}
.dec-btn{width:100%;padding:12px;background:var(--purple);color:#fff;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;font-family:inherit}
.dec-btn:hover{opacity:.9;transform:translateY(-1px)}
.dec-res{margin-top:11px;padding:12px 14px;background:var(--surf);border-radius:10px;border:1px solid var(--brd)}
.pri-tile{background:var(--surf);border:1px solid rgba(220,38,38,.2);border-radius:13px;padding:15px 16px;margin-bottom:11px}
.pri-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;background:rgba(220,38,38,.08);margin-bottom:5px;border:1px solid rgba(220,38,38,.12);cursor:pointer}
.pri-item:last-child{margin-bottom:0}
.cal-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.cal-dlbl{font-size:9px;font-weight:700;color:var(--tx3);text-align:center;padding:5px 0;letter-spacing:.06em;text-transform:uppercase}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-cell{padding:5px 4px 4px;border-radius:8px;cursor:pointer;text-align:center;font-size:12px;color:var(--tx2);transition:all .12s;min-height:72px;display:flex;flex-direction:column;align-items:center;border:1px solid transparent}
.cal-cell:hover{background:var(--hov);border-color:var(--brd)}
.cal-cell.today{background:rgba(124,58,237,.1);color:var(--purple);font-weight:700;border-color:rgba(124,58,237,.25)}
.cal-cell.other{opacity:.3}
.cal-evts{display:flex;flex-direction:column;gap:1px;width:100%;margin-top:3px}
.cal-ev{font-size:9px;padding:2px 4px;border-radius:3px;text-align:left;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wev{border-radius:5px;padding:3px 7px;font-size:10px;font-weight:600;margin-bottom:2px;cursor:pointer;border-left:3px solid}
.hour-lbl{font-size:10px;color:var(--tx3);text-align:right;padding-right:9px;padding-top:6px;border-top:1px solid var(--brd);min-height:52px;width:48px;flex-shrink:0}
.hour-slot{border-top:1px solid var(--brd);border-left:1px solid var(--brd);min-height:52px;padding:3px 5px}
.cal-wrap{display:flex;height:100%;overflow:hidden}
.cal-main{flex:1;overflow-y:auto;padding:16px 18px;transition:all .22s}
.cal-panel{width:0;background:var(--surf);border-left:1px solid var(--brd);display:flex;flex-direction:column;overflow:hidden;transition:width .22s;flex-shrink:0}
.cal-panel.open{width:300px}
.cap-hdr{padding:12px 14px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:8px;flex-shrink:0}
.cap-msgs{flex:1;overflow-y:auto;padding:12px 14px}
.cap-msg{margin-bottom:9px;display:flex;gap:7px}
.cap-msg.user{justify-content:flex-end}
.cap-bub{max-width:85%;padding:8px 11px;border-radius:10px;font-size:11px;line-height:1.6}
.cap-msg.user .cap-bub{background:var(--purple);color:#fff;border-radius:10px 10px 3px 10px}
.cap-msg.ai .cap-bub{background:var(--elev);border:1px solid var(--brd);border-radius:10px 10px 10px 3px;color:var(--tx);white-space:pre-wrap}
.cap-inp{padding:10px 12px;border-top:1px solid var(--brd);display:flex;gap:7px;flex-shrink:0}
.req-card{background:var(--elev);border:1px solid var(--brd);border-radius:11px;padding:14px;margin-bottom:10px;transition:border-color .15s}
.req-card:hover{border-color:var(--brd2)}
.req-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.ai-sug{background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.2);border-radius:9px;padding:10px 12px;margin:9px 0}
.ai-sug-lbl{font-size:10px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.ai-sug-txt{font-size:12px;font-weight:600;color:var(--tx)}
.ai-sug-why{font-size:11px;color:var(--tx2);margin-top:3px;line-height:1.5}
.empty{padding:28px 20px;text-align:center}
.empty-t{font-size:13px;font-weight:600;color:var(--tx2);margin-bottom:5px}
.empty-s{font-size:12px;color:var(--tx3);line-height:1.5;max-width:220px;margin:0 auto 14px}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.modal{background:var(--surf);border:1px solid var(--brd2);border-radius:17px;padding:22px;width:430px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.mx{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:20px;line-height:1;padding:0}
.macts{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.fabs{position:fixed;bottom:22px;right:22px;display:flex;flex-direction:column;gap:8px;align-items:flex-end;z-index:100}
.fab{width:50px;height:50px;border-radius:50%;background:var(--purple);color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;box-shadow:0 4px 20px rgba(124,58,237,.4);transition:all .2s;font-family:inherit}
.fab:hover{transform:scale(1.08)}
.fab.sm{width:40px;height:40px;background:var(--elev);border:1px solid var(--brd2);color:var(--tx2);font-size:16px;box-shadow:none}
.fab.sm:hover{background:var(--hov);transform:scale(1.05)}
.chat-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden}
.chat-msgs{flex:1;overflow-y:auto;padding:16px 18px}
.msg{display:flex;gap:9px;margin-bottom:12px}
.msg.user{justify-content:flex-end}
.msg-bub{max-width:78%;padding:10px 13px;border-radius:13px;font-size:12px;line-height:1.65}
.msg.user .msg-bub{background:var(--purple);color:#fff;border-radius:13px 13px 3px 13px}
.msg.ai .msg-bub{background:var(--elev);border:1px solid var(--brd);border-radius:13px 13px 13px 3px;color:var(--tx);white-space:pre-wrap}
.msg-av{width:28px;height:28px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.chat-inp-area{padding:13px 18px;border-top:1px solid var(--brd);background:var(--surf);display:flex;gap:9px;flex-shrink:0}
.bbar-bg{flex:1;height:9px;border-radius:5px;background:var(--elev);cursor:pointer;overflow:hidden;border:1px solid var(--brd)}
.bbar-fill{height:100%;border-radius:5px;transition:width .3s}
.budget-inp{width:50px;padding:4px 7px;background:var(--elev);border:1px solid var(--brd2);border-radius:6px;color:var(--tx);font-size:11px;outline:none;font-family:inherit;text-align:center}
.brain-item{padding:12px 14px;margin-bottom:7px;border-radius:10px;border:1px solid var(--brd);background:var(--elev);transition:border-color .15s}
.brain-item:hover{border-color:var(--brd2)}
.dl-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;border:1px solid var(--brd);background:var(--elev);margin-bottom:7px;cursor:pointer;transition:border-color .15s}
.dl-item:hover{border-color:var(--brd2)}
.dl-bar{width:4px;border-radius:3px;flex-shrink:0;align-self:stretch}
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.kancol{background:var(--elev);border-radius:11px;padding:12px;border:1px solid var(--brd);min-height:180px}
.kancol-title{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--brd)}
.kancard{background:var(--surf);border:1px solid var(--brd);border-radius:8px;padding:9px 11px;margin-bottom:6px;font-size:12px;transition:border-color .15s;cursor:pointer}
.kancard:hover{border-color:var(--brd2)}
.sw{width:38px;height:21px;border-radius:11px;background:var(--purple);position:relative;transition:background .2s;flex-shrink:0;cursor:pointer}
.sw::after{content:'';position:absolute;width:15px;height:15px;border-radius:50%;background:#fff;top:3px;right:3px;transition:right .2s}
.sw.off{background:var(--brd2)}
.sw.off::after{right:20px}
.s-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--brd);cursor:pointer}
.s-row:last-child{border-bottom:none}
.mood-btn{flex:1;padding:9px 4px;border-radius:10px;border:1px solid var(--brd);background:var(--elev);cursor:pointer;text-align:center;transition:all .15s}
.mood-btn.on{border-color:var(--purple);background:rgba(124,58,237,.08)}
.bar-wrap{display:flex;align-items:flex-end;gap:6px;height:130px;padding:0 4px}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.bar{width:100%;border-radius:5px 5px 0 0;transition:height .4s;min-height:4px}
.bar-lbl{font-size:9px;color:var(--tx3);font-weight:600;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%}
.bar-val{font-size:9px;color:var(--tx2);font-weight:700}
.col-sw{width:28px;height:28px;border-radius:7px;cursor:pointer;border:2px solid var(--brd2);flex-shrink:0;transition:transform .15s}
.col-sw:hover{transform:scale(1.1)}

<script>
var $ = function(id){return document.getElementById(id)};
var today = new Date();
var todayStr = fmtD(today);
var theme = 'dark';
var calView = 'month';
var calOff = 0;
var calAIOpen = false;
var decIdx = 0;
var decShown = false;
var mood = null;
var calAIMsgs = [{role:'ai',text:'I can see your calendar. Ask me to find a free slot, check overload, plan your week, or reschedule something.'}];
var chatMsgs = [{role:'ai',text:"Hey - I'm your AI. I know your schedule, tasks and requests. Ask me anything about your day or priorities."}];
var wDone = {};
var pDone = {};
var reqDone = {};
var budgets = {lavarion:8,oa:6,sourcing:5,team:3,admin:4,discord:3,learning:4,personal:5,health:4,social:3};
var catColors = {lavarion:'#7C3AED',oa:'#0D9488',sourcing:'#16A34A',team:'#2563EB',admin:'#D97706',discord:'#EA580C',personal:'#DB2777',health:'#0891B2',social:'#65A30D',break:'#6B7280',home:'#6B7280',goals:'#16A34A',learning:'#0891B2'};

var events = [];
var workTasks = [];
var personalTasks = [];
var workReqs = [];
var personalReqs = [];
var brainItems = [];
var deadlines = [];
var skuPipeline = [];
var launchGoals = [];
var learningGoals = [];
var brandMilestones = [];
var suppliers = [];
var mealPlan = {mon:'',tue:'',wed:'',thu:'',fri:'',sat:'',sun:''};
var savedMeals = [];
var shoppingList = [];
var gymLog = [];
var financeLog = [];
var wishlist = [];
var reminders = [];
var ceoReviews = [];
var qaType = 'work';

var PAGE_TITLES = {dashboard:'Dashboard',calendar:'Calendar',work:'Work Tasks',workinbox:'Work Inbox',goals:'Weekly Goals',brain:'Second Brain',deadlines:'Deadlines',growth:'Growth Tracker',ceo:'CEO Review',analytics:'Analytics',personal:'Personal Tasks',personalinbox:'Personal Inbox',personalpage:'Personal Page',food:'Food',ai:'AI Chat',settings:'Settings'};

function fmtD(d) {
  var r = new Date(d);
  return r.toISOString().split('T')[0];
}
function addD(d,n) {
  var r = new Date(d);
  r.setDate(r.getDate()+n);
  return r;
}
function weekStart(d) {
  var r = new Date(d);
  var day = r.getDay() === 0 ? 6 : r.getDay()-1;
  r.setDate(r.getDate()-day);
  return r;
}
function fmtUK(str) {
  if(!str) return '';
  var d = new Date(str);
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}
function cb(cat) {
  var c = catColors[cat] || '#6B7280';
  return c + '22';
}
function mkTag(cat,txt) {
  var c = catColors[cat] || '#6B7280';
  return '<span class="tag" style="background:' + c + '22;color:' + c + '">' + (txt||cat) + '</span>';
}
function priTag(p) {
  if(p==='urgent') return '<span class="tag" style="background:rgba(220,38,38,.15);color:#DC2626">urgent</span>';
  if(p==='high') return '<span class="tag" style="background:rgba(217,119,6,.15);color:#D97706">high</span>';
  return '<span class="tag" style="background:var(--elev);color:var(--tx3)">normal</span>';
}
function emptyState(t,s) {
  return '<div class="empty"><div class="empty-t">' + t + '</div>' + (s?'<div class="empty-s">'+s+'</div>':'') + '</div>';
}

$('top-date').textContent = today.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
document.body.setAttribute('data-t','dark');

function toggleTheme() {
  theme = theme==='dark'?'light':'dark';
  document.body.setAttribute('data-t',theme);
}
function toggleSb() {
  $('sb').classList.toggle('open');
}

function updateBadges() {
  var wu = workTasks.filter(function(t){return !wDone[t.id]&&t.pri==='urgent'}).length;
  var wr = workReqs.filter(function(r){return !reqDone['w-'+r.id]}).length;
  var pr = personalReqs.filter(function(r){return !reqDone['p-'+r.id]}).length;
  $('dot-work').style.display = wu>0?'block':'none';
  $('dot-winbox').style.display = wr>0?'block':'none';
  $('dot-pinbox').style.display = pr>0?'block':'none';
  var bar = $('g-alert');
  var urgentWork = workTasks.filter(function(t){return !wDone[t.id]&&t.pri==='urgent'});
  if(urgentWork.length>0||wr>0||pr>0) {
    bar.style.display = 'flex';
    var parts = [];
    if(urgentWork.length>0) parts.push('<a onclick="nav(\'work\')">' + urgentWork.length + ' urgent work task' + (urgentWork.length>1?'s':'') + '</a>');
    if(wr>0) parts.push('<a onclick="nav(\'workinbox\')">' + wr + ' work request' + (wr>1?'s':'') + '</a>');
    if(pr>0) parts.push('<a onclick="nav(\'personalinbox\')">' + pr + ' personal request' + (pr>1?'s':'') + '</a>');
    $('g-alert-txt').innerHTML = 'Action needed: ' + parts.join(' . ');
  } else {
    bar.style.display = 'none';
  }
}

function nav(pg) {
  Object.keys(PAGE_TITLES).forEach(function(p) {
    var b = $('nb-'+p);
    if(b) b.classList.toggle('on', p===pg);
  });
  $('cal-vtog').style.display = pg==='calendar'?'flex':'none';
  $('cal-ai-btn').style.display = pg==='calendar'?'block':'none';
  $('pg-title').textContent = PAGE_TITLES[pg]||pg;
  var c = $('pg');
  c.className = 'content';
  c.innerHTML = '';
  calAIOpen = false;
  if(pg==='ai'||pg==='calendar') c.className = 'content np';
  updateBadges();
  if(pg==='dashboard') renderDash(c);
  else if(pg==='calendar') renderCal(c);
  else if(pg==='work') renderWork(c);
  else if(pg==='workinbox') renderInbox(c,'work');
  else if(pg==='goals') renderGoals(c);
  else if(pg==='brain') renderBrain(c);
  else if(pg==='deadlines') renderDeadlines(c);
  else if(pg==='growth') renderGrowth(c);
  else if(pg==='ceo') renderCEO(c);
  else if(pg==='analytics') renderAnalytics(c);
  else if(pg==='personal') renderPersonal(c);
  else if(pg==='personalinbox') renderInbox(c,'personal');
  else if(pg==='personalpage') renderPersonalPage(c);
  else if(pg==='food') renderFood(c);
  else if(pg==='ai') renderAI(c);
  else if(pg==='settings') renderSettings(c);
}

function setCalV(v,btn) {
  calView=v;
  document.querySelectorAll('#cal-vtog .vb').forEach(function(b){b.classList.remove('on')});
  btn.classList.add('on');
  nav('calendar');
}
function toggleCalAI() {
  calAIOpen=!calAIOpen;
  nav('calendar');
}

// -- DASHBOARD --
function renderDash(c) {
  var wOpen = workTasks.filter(function(t){return !wDone[t.id]}).length;
  var pOpen = personalTasks.filter(function(t){return !pDone[t.id]}).length;
  var urgent = workTasks.filter(function(t){return !wDone[t.id]&&t.pri==='urgent'});
  var pendingW = workReqs.filter(function(r){return !reqDone['w-'+r.id]}).length;
  var pendingP = personalReqs.filter(function(r){return !reqDone['p-'+r.id]}).length;

  var ws = weekStart(today);
  var weekH = '';
  for(var i=0;i<7;i++) {
    var d = addD(ws,i);
    var ds = fmtD(d);
    var isT = ds===todayStr;
    var de = events.filter(function(e){return e.date===ds});
    var dots = de.slice(0,4).map(function(e){return '<div class="wdot" style="background:'+(catColors[e.cat]||'#888')+'"></div>'}).join('');
    weekH += '<div class="wd' + (isT?' today':'') + '" onclick="nav(\'calendar\')">';
    weekH += '<div class="wd-name">' + d.toLocaleDateString('en-GB',{weekday:'short'}) + '</div>';
    weekH += '<div class="wd-num">' + d.getDate() + '</div>';
    weekH += '<div class="wd-dots">' + dots + '</div></div>';
  }

  var todayEvts = events.filter(function(e){return e.date===todayStr}).sort(function(a,b){return a.time.localeCompare(b.time)});
  var schedH = '';
  if(todayEvts.length) {
    todayEvts.forEach(function(e) {
      schedH += '<div class="si" onclick="nav(\'calendar\')">';
      schedH += '<div class="si-dot" style="background:'+(catColors[e.cat]||'#888')+'"></div>';
      schedH += '<div style="flex:1;font-size:12px;font-weight:500">' + e.title + '</div>';
      schedH += '<div style="font-size:10px;color:var(--tx3)">' + e.time + '</div></div>';
    });
  } else {
    schedH = emptyState('No events today','Add one via the + button');
  }

  var topWork = workTasks.filter(function(t){return !wDone[t.id]}).slice(0,4);
  var workH = '';
  if(topWork.length) {
    topWork.forEach(function(t) {
      workH += '<div class="ti" data-id="' + t.id + '" data-type="w">';
      workH += '<div class="chk' + (wDone[t.id]?' done':'') + '"></div>';
      workH += '<div style="flex:1"><div class="ti-text' + (wDone[t.id]?' done':'') + '">' + t.text + '</div>';
      workH += '<div class="ti-meta">' + mkTag(t.cat) + priTag(t.pri) + '</div></div></div>';
    });
  } else {
    workH = emptyState('No work tasks yet','Add tasks with the + button');
  }

  var topPers = personalTasks.filter(function(t){return !pDone[t.id]}).slice(0,3);
  var persH = '';
  if(topPers.length) {
    topPers.forEach(function(t) {
      persH += '<div class="ti" data-id="' + t.id + '" data-type="p">';
      persH += '<div class="chk' + (pDone[t.id]?' done':'') + '"></div>';
      persH += '<div style="flex:1"><div class="ti-text' + (pDone[t.id]?' done':'') + '">' + t.text + '</div>';
      persH += '<div class="ti-meta">' + mkTag(t.cat) + '</div></div></div>';
    });
  } else {
    persH = emptyState('No personal tasks yet','');
  }

  var decH = '';
  if(decShown) {
    var dec = getDecisions();
    var d = dec[decIdx] || {task:'Add some tasks first',why:'Mark tasks as urgent or high priority.'};
    decH = '<div class="dec-res">';
    decH += '<div style="font-size:13px;font-weight:600">' + d.task + '</div>';
    decH += '<div style="font-size:11px;color:var(--tx2);margin-top:4px;line-height:1.5">' + d.why + '</div>';
    decH += '<div style="display:flex;gap:6px;margin-top:9px">';
    decH += '<button class="abtn p" onclick="nav(\'work\')">Go do it</button>';
    decH += '<button class="abtn s" onclick="nextDec()">Next</button>';
    decH += '<button class="abtn s" onclick="decShown=false;nav(\'dashboard\')">Dismiss</button></div></div>';
  }

  var priItems = [];
  if(urgent.length) priItems.push({text:urgent.length+' urgent work task'+(urgent.length>1?'s':''),count:urgent.length,pg:'work'});
  if(pendingW) priItems.push({text:pendingW+' work request'+(pendingW>1?'s':'')+' waiting',count:pendingW,pg:'workinbox'});
  if(pendingP) priItems.push({text:pendingP+' personal request'+(pendingP>1?'s':'')+' waiting',count:pendingP,pg:'personalinbox'});
  var highIgn = personalTasks.filter(function(t){return !pDone[t.id]&&t.pri==='high'});
  if(highIgn.length) priItems.push({text:highIgn.length+' personal thing'+(highIgn.length>1?'s':'')+' being ignored',count:highIgn.length,pg:'personal'});
  var priH = '';
  if(priItems.length) {
    priItems.forEach(function(p) {
      priH += '<div class="pri-item" onclick="nav(\'' + p.pg + '\')">';
      priH += '<div style="width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0"></div>';
      priH += '<div style="flex:1;font-size:12px;font-weight:500">' + p.text + '</div>';
      priH += '<div style="font-size:11px;font-weight:700;color:var(--red)">' + p.count + '</div></div>';
    });
  } else {
    priH = '<div style="padding:12px 0;text-align:center;color:var(--tx3);font-size:12px">All clear right now</div>';
  }

  var html = '';
  html += '<div class="aib">';
  html += '<div class="aih"><div class="puls"></div><div class="ailbl">AI Daily Briefing</div>';
  html += '<div class="ait">' + today.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) + '</div></div>';
  html += '<div class="aitext">Welcome to WOJ. Start by adding your tasks, events and deadlines - then I\'ll help you plan and prioritise everything. Use the + button to add things fast.</div>';
  html += '<div class="chips"><div class="chip" onclick="nav(\'ai\')">Help me plan my week</div><div class="chip" onclick="nav(\'ai\')">What should I do first?</div><div class="chip" onclick="openQA()">Add a task</div></div></div>';

  html += '<div class="pri-tile"><div class="th"><div class="tlbl" style="color:var(--red)">High priority</div><div class="ta" onclick="nav(\'work\')">View all</div></div>' + priH + '</div>';

  html += '<div class="tile"><div class="th"><div class="tlbl">This week - Mon to Sun</div><div class="ta" onclick="nav(\'calendar\')">Full calendar</div></div>';
  html += '<div class="week-strip">' + weekH + '</div></div>';

  html += '<div class="g2">';
  html += '<div class="tile"><div class="th"><div class="tlbl">Today</div><div class="ta" onclick="nav(\'calendar\')">Day view</div></div><div style="display:flex;flex-direction:column;gap:5px">' + schedH + '</div></div>';
  html += '<div class="dec"><div class="th" style="margin-bottom:11px"><div class="tlbl" style="color:var(--purple)">Decision Engine</div><span>&#9889;</span></div>';
  html += '<button class="dec-btn" onclick="decShown=true;decIdx=0;nav(\'dashboard\')">&#9889; What do I do right now?</button>' + decH + '</div></div>';

  html += '<div class="g3" style="margin-bottom:11px">';
  html += '<div class="tile s2"><div class="th"><div class="tlbl">Work priorities</div><div class="ta" onclick="nav(\'work\')">All tasks</div></div><div class="tasks" id="dw">' + workH + '</div></div>';
  html += '<div class="tile"><div class="th"><div class="tlbl">Personal</div><div class="ta" onclick="nav(\'personal\')">All</div></div><div class="tasks" id="dp">' + persH + '</div></div></div>';

  html += '<div class="g4">';
  html += '<div class="sc tile"><div class="sv" style="color:var(--purple)">' + wOpen + '</div><div class="sl">Work open</div></div>';
  html += '<div class="sc tile"><div class="sv" style="color:var(--teal)">' + pOpen + '</div><div class="sl">Personal open</div></div>';
  html += '<div class="sc tile"><div class="sv" style="color:var(--red)">' + urgent.length + '</div><div class="sl">Urgent</div></div>';
  html += '<div class="sc tile"><div class="sv" style="color:var(--amber)">' + (pendingW+pendingP) + '</div><div class="sl">Requests</div></div></div>';

  c.innerHTML = html;

  c.querySelectorAll('.ti').forEach(function(el) {
    el.addEventListener('click', function() {
      var id = parseInt(this.dataset.id);
      var t = this.dataset.type;
      if(t==='w') { wDone[id]=!wDone[id]; }
      else { pDone[id]=!pDone[id]; }
      var done = t==='w'?wDone[id]:pDone[id];
      this.querySelector('.chk').classList.toggle('done',done);
      this.querySelector('.ti-text').classList.toggle('done',done);
      updateBadges();
    });
  });
}

function getDecisions() {
  var u = workTasks.filter(function(t){return !wDone[t.id]&&t.pri==='urgent'});
  var h = workTasks.filter(function(t){return !wDone[t.id]&&t.pri==='high'});
  var all = u.concat(h);
  if(!all.length) return [{task:'No urgent tasks',why:'Add tasks and mark them urgent or high priority.'}];
  return all.map(function(t){return {task:t.text,why:'Priority: '+t.pri+'. '+(t.notes||'Action this before moving on.')}});
}
function nextDec() {
  var dec = getDecisions();
  decIdx = (decIdx+1) % Math.max(1,dec.length);
  nav('dashboard');
}

// -- CALENDAR --
function renderCal(c) {
  var wrap = document.createElement('div');
  wrap.className = 'cal-wrap';

  var main = document.createElement('div');
  main.className = 'cal-main';
  main.id = 'cal-main';

  var panel = document.createElement('div');
  panel.className = 'cal-panel' + (calAIOpen?' open':'');
  panel.id = 'cal-panel';

  if(calView==='month') renderMonth(main);
  else if(calView==='week') renderWeek(main);
  else renderDay(main);

  var capMsgs = calAIMsgs.map(function(m) {
    return '<div class="cap-msg ' + m.role + '"><div class="cap-bub">' + m.text + '</div></div>';
  }).join('');

  var calSuggs = '';
  if(calAIMsgs.length<=1) {
    var suggs = ['Find me a free slot today','Am I overloaded this week?','Plan my week from scratch','When can I fit Lavarion work?'];
    calSuggs = '<div class="chips" style="padding:0 12px 10px">';
    suggs.forEach(function(s) {
      calSuggs += '<div class="chip" style="font-size:10px" data-cs="' + s + '">' + s + '</div>';
    });

  }

  panel.innerHTML = '<div class="cap-hdr"><div class="puls"></div><div style="font-size:12px;font-weight:600;color:var(--purple)">Schedule with AI</div><button onclick="calAIOpen=false;nav(\'calendar\')" style="margin-left:auto;background:none;border:none;color:var(--tx3);cursor:pointer;font-size:18px">x</button></div><div class="cap-msgs" id="cap-msgs">' + capMsgs + '</div>' + calSuggs + '<div class="cap-inp"><input class="minput" id="cap-inp" placeholder="Ask about your calendar..." style="font-size:11px"/><button class="btn-p" id="cap-send" style="padding:8px 12px;font-size:11px">Send</button></div>';

  wrap.appendChild(main);
  wrap.appendChild(panel);

  document.querySelectorAll('[data-cs]').forEach(function(el) {
    el.addEventListener('click', function(){doCalChat(this.dataset.cs)});
  });
}

function doCalChat(text) {
  text = text.trim();
  if(!text) return;
  calAIMsgs.push({role:'user',text:text});
  calAIMsgs.push({role:'ai',text:'...'});
  nav('calendar');
  fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    model:'claude-sonnet-4-20250514',max_tokens:400,
    system:'You are the calendar AI inside WOJ (World of Jack), Jack Bithell\'s personal command centre. He runs an Amazon FBA business and Lavarion private label brand. Help him manage his calendar. Today: '+today.toLocaleDateString('en-GB')+'. Events this week: '+JSON.stringify(events.slice(0,10))+'. Be direct, 2-3 sentences max.',
    messages:calAIMsgs.filter(function(m){return m.text!=='...'}).slice(-8).map(function(m){return {role:m.role==='ai'?'assistant':'user',content:m.text}})
  })}).then(function(r){return r.json()}).then(function(data){
    calAIMsgs[calAIMsgs.length-1].text = data.content&&data.content[0]?data.content[0].text:'Try again.';
    nav('calendar');
  }).catch(function(){
    calAIMsgs[calAIMsgs.length-1].text = 'Connection issue - try again.';
    nav('calendar');
  });
}

function renderMonth(c) {
  var ref = new Date(today);
  ref.setMonth(ref.getMonth()+calOff);
  var y = ref.getFullYear(), m = ref.getMonth();
  var first = new Date(y,m,1), last = new Date(y,m+1,0);
  var startDay = first.getDay()===0?6:first.getDay()-1;
  var days = '';
  for(var i=0;i<startDay;i++) {
    var pd = new Date(y,m,1-startDay+i);
    days += '<div class="cal-cell other"><span>'+pd.getDate()+'</span></div>';
  }
  for(var d=1;d<=last.getDate();d++) {
    var ds = y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var isT = ds===todayStr;
    var de = events.filter(function(e){return e.date===ds});
    var evH = de.slice(0,2).map(function(e){
      return '<div class="cal-ev" style="background:'+cb(e.cat)+';color:'+(catColors[e.cat]||'#888')+'">'+e.time+' '+e.title+'</div>';
    }).join('');
    var more = de.length>2?'<div style="font-size:9px;color:var(--tx3)">+' + (de.length-2) + '</div>':'';
    days += '<div class="cal-cell' + (isT?' today':'') + '" data-ds="' + ds + '">';
    days += '<span>'+d+'</span><div class="cal-evts">'+evH+more+'</div></div>';
  }
  var rem = (7-((startDay+last.getDate())%7))%7;
  for(var i2=1;i2<=rem;i2++) days += '<div class="cal-cell other"><span>'+i2+'</span></div>';

  var navH = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:13px">';
  navH += '<button class="abtn s" onclick="calOff--;nav(\'calendar\')">&#9664;</button>';
  navH += '<div style="flex:1;font-size:14px;font-weight:700">'+ref.toLocaleDateString('en-GB',{month:'long',year:'numeric'})+'</div>';
  navH += '<button class="abtn s" onclick="calOff=0;nav(\'calendar\')">Today</button>';
  navH += '<button class="abtn s" onclick="calOff++;nav(\'calendar\')">&#9654;</button>';
  navH += '<button class="abtn p" onclick="openQA()">+ Add</button></div>';

  c.innerHTML = '<div class="tile">' + navH + '<div class="cal-hdr"><div class="cal-dlbl">Mon</div><div class="cal-dlbl">Tue</div><div class="cal-dlbl">Wed</div><div class="cal-dlbl">Thu</div><div class="cal-dlbl">Fri</div><div class="cal-dlbl">Sat</div><div class="cal-dlbl">Sun</div></div><div class="cal-body">' + days + '</div></div>';

  c.querySelectorAll('[data-ds]').forEach(function(el) {
    el.addEventListener('click', function(){openDayModal(this.dataset.ds)});
  });
}

function renderWeek(c) {
  var ws = weekStart(addD(today,calOff*7));
  var days = [];
  for(var i=0;i<7;i++) days.push(addD(ws,i));
  var hours = [];
  for(var h=7;h<=21;h++) hours.push(h);

  var hdr = '<div style="width:48px"></div>';
  days.forEach(function(d) {
    var isT = fmtD(d)===todayStr;
    hdr += '<div style="text-align:center;padding:8px 3px;border-bottom:1px solid var(--brd);background:'+(isT?'rgba(124,58,237,.1)':'var(--elev)')+';">';
    hdr += '<div style="font-size:9px;color:var(--tx3);text-transform:uppercase;font-weight:700">'+d.toLocaleDateString('en-GB',{weekday:'short'})+'</div>';
    hdr += '<div style="font-size:17px;font-weight:800;color:'+(isT?'var(--purple)':'var(--tx)')+'">'+d.getDate()+'</div></div>';
  });

  var body = '';
  hours.forEach(function(h) {
    body += '<div class="hour-lbl">'+String(h).padStart(2,'0')+':00</div>';
    days.forEach(function(d) {
      var ds = fmtD(d);
      var se = events.filter(function(e){return e.date===ds&&parseInt(e.time)===h});
      var evH = se.map(function(e) {
        return '<div class="wev" data-evid="'+e.id+'" style="background:'+cb(e.cat)+';color:'+(catColors[e.cat]||'#888')+';border-left-color:'+(catColors[e.cat]||'#888')+'">'+e.time+' '+e.title+'</div>';
      }).join('');
      body += '<div class="hour-slot">'+evH+'</div>';
    });
  });

  var navH = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:11px">';
  navH += '<button class="abtn s" onclick="calOff--;nav(\'calendar\')">&#9664;</button>';
  navH += '<div style="flex:1;font-size:13px;font-weight:700">'+days[0].toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' to '+days[6].toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})+'</div>';
  navH += '<button class="abtn s" onclick="calOff=0;nav(\'calendar\')">Today</button>';
  navH += '<button class="abtn s" onclick="calOff++;nav(\'calendar\')">&#9654;</button>';
  navH += '<button class="abtn p" onclick="openQA()">+ Add</button></div>';

  c.innerHTML = '<div class="tile" style="overflow-x:auto">' + navH + '<div style="display:grid;grid-template-columns:48px repeat(7,1fr);min-width:560px">'+hdr+body+'</div></div>';
  c.querySelectorAll('[data-evid]').forEach(function(el) {
    el.addEventListener('click', function(){openEventModal(parseInt(this.dataset.evid))});
  });
}

function renderDay(c) {
  var d = addD(today,calOff);
  var ds = fmtD(d);
  var de = events.filter(function(e){return e.date===ds}).sort(function(a,b){return a.time.localeCompare(b.time)});
  var hours = [];
  for(var h=6;h<=22;h++) hours.push(h);
  var html = '';
  hours.forEach(function(h) {
    var se = de.filter(function(e){return parseInt(e.time)===h});
    var evH = se.map(function(e) {
      return '<div data-evid="'+e.id+'" style="background:'+cb(e.cat)+';border-left:3px solid '+(catColors[e.cat]||'#888')+';border-radius:0 8px 8px 0;padding:6px 10px;margin-bottom:3px;cursor:pointer"><div style="font-size:12px;font-weight:600">'+e.title+'</div><div style="font-size:10px;color:'+(catColors[e.cat]||'#888')+';margin-top:2px">'+e.time+' &middot; '+e.dur+'min</div></div>';
    }).join('');
    html += '<div class="hour-lbl">'+String(h).padStart(2,'0')+':00</div><div class="hour-slot">'+evH+'</div>';
  });

  var navH = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:13px">';
  navH += '<button class="abtn s" onclick="calOff--;nav(\'calendar\')">&#9664;</button>';
  navH += '<div style="flex:1;font-size:14px;font-weight:700">'+d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})+'</div>';
  navH += '<button class="abtn s" onclick="calOff=0;nav(\'calendar\')">Today</button>';
  navH += '<button class="abtn s" onclick="calOff++;nav(\'calendar\')">&#9654;</button>';
  navH += '<button class="abtn p" onclick="openQA()">+ Add</button></div>';

  c.innerHTML = '<div class="tile">' + navH + (de.length===0?emptyState('No events this day','Add one with the + button'):'') + '<div style="display:grid;grid-template-columns:48px 1fr">'+html+'</div></div>';
  c.querySelectorAll('[data-evid]').forEach(function(el) {
    el.addEventListener('click', function(){openEventModal(parseInt(this.dataset.evid))});
  });

function openDayModal(ds) {
  var de = events.filter(function(e){return e.date===ds});
  var d = new Date(ds);
  var html = '<div class="modal-title">'+d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})+'<button class="mx" onclick="closeModal()">x</button></div>';
  if(!de.length) html += '<div style="color:var(--tx3);font-size:13px;padding:12px 0">No events - add one?</div>';
  de.forEach(function(e) {
    html += '<div style="display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--brd);cursor:pointer" data-evid="'+e.id+'">';
    html += '<div style="width:9px;height:9px;border-radius:50%;background:'+(catColors[e.cat]||'#888')+'"></div>';
    html += '<div style="flex:1;font-size:13px;font-weight:500">'+e.title+'</div>';
    html += '<div style="font-size:11px;color:var(--tx3)">'+e.time+'</div></div>';
  });
  html += '<div class="macts"><button class="btn-p" onclick="closeModal();openQA()">+ Add event</button><button class="btn-s" onclick="closeModal()">Close</button></div>';
  showModal(html);
  document.querySelectorAll('[data-evid]').forEach(function(el) {
    el.addEventListener('click', function(){closeModal();openEventModal(parseInt(this.dataset.evid))});
  });
}

function openEventModal(id) {
  var e = events.find(function(x){return x.id===id});
  if(!e) return;
  var html = '<div class="modal-title">'+e.title+'<button class="mx" onclick="closeModal()">x</button></div>';
  html += '<div style="display:flex;gap:6px;margin-bottom:13px">'+mkTag(e.cat)+mkTag(e.type)+'</div>';
  html += '<table style="width:100%;font-size:12px;line-height:2.2">';
  html += '<tr><td style="color:var(--tx3)">Date</td><td style="text-align:right">'+fmtUK(e.date)+'</td></tr>';
  html += '<tr><td style="color:var(--tx3)">Time</td><td style="text-align:right">'+e.time+'</td></tr>';
  html += '<tr><td style="color:var(--tx3)">Duration</td><td style="text-align:right">'+e.dur+' minutes</td></tr></table>';
  html += '<div class="macts"><button class="btn-r" onclick="events=events.filter(function(x){return x.id!=='+id+'});closeModal();nav(\'calendar\')">Delete</button><button class="btn-s" onclick="closeModal()">Close</button></div>';
  showModal(html);
}

// -- WORK TASKS --
function renderWork(c) {
  var activeCat = 'all';
  var cats = ['all','lavarion','oa','sourcing','team','admin','discord','learning'];
  function draw() {
    var tasks = activeCat==='all'?workTasks:workTasks.filter(function(t){return t.cat===activeCat});
    var urgentT = tasks.filter(function(t){return !wDone[t.id]&&t.pri==='urgent'});
    var alertH = '';
    if(urgentT.length) {
      alertH = '<div style="background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.2);border-radius:11px;padding:12px 14px;margin-bottom:11px;display:flex;gap:9px">';
      alertH += '<div style="color:var(--red);font-size:16px">!</div>';
      alertH += '<div><div style="font-size:12px;font-weight:600;color:var(--red);margin-bottom:3px">'+urgentT.length+' urgent task'+(urgentT.length>1?'s':'')+' - action these first</div>';
      alertH += '<div style="font-size:11px;color:var(--tx2)">'+urgentT.map(function(t){return t.text}).join(' &middot; ')+'</div></div></div>';
    }
    var filterH = cats.map(function(ct) {
      return '<div class="cf-btn" style="font-size:11px;font-weight:600;padding:4px 11px;border-radius:20px;cursor:pointer;border:1px solid '+(activeCat===ct?(catColors[ct]||'var(--purple)'):'var(--brd)')+';background:'+(activeCat===ct?(catColors[ct]||'var(--purple)'):'var(--elev)')+';color:'+(activeCat===ct?'#fff':'var(--tx3)')+';transition:all .15s" data-cat="'+ct+'">'+ct+'</div>';
    }).join('');

    var grouped = {};
    tasks.forEach(function(t){if(!grouped[t.cat]) grouped[t.cat]=[];grouped[t.cat].push(t)});
    var tasksH = '';
    if(activeCat==='all') {
      if(!tasks.length) { tasksH = emptyState('No work tasks yet','Add your first task using + button'); }
      else {
        Object.keys(grouped).forEach(function(cat) {
          var ts = grouped[cat];
          tasksH += '<div style="margin-bottom:16px">';
          tasksH += '<div style="display:flex;align-items:center;gap:8px;padding-bottom:6px;border-bottom:1px solid var(--brd);margin-bottom:6px">';
          tasksH += '<div style="width:8px;height:8px;border-radius:50%;background:'+(catColors[cat]||'#888')+'"></div>';
          tasksH += '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:'+(catColors[cat]||'#888')+'">'+cat+'</div>';
          tasksH += '<div style="font-size:10px;color:var(--tx3);margin-left:auto">'+ts.length+'</div></div>';
          ts.forEach(function(t) {
            tasksH += '<div class="ti" data-wid="'+t.id+'">';
            tasksH += '<div class="chk'+(wDone[t.id]?' done':'')+'"></div>';
            tasksH += '<div style="flex:1"><div class="ti-text'+(wDone[t.id]?' done':'')+'">'+t.text+'</div>';
            if(t.notes) tasksH += '<div style="font-size:10px;color:var(--tx3);margin-top:2px">'+t.notes+'</div>';
            tasksH += '<div class="ti-meta">'+priTag(t.pri)+'</div></div>';
            tasksH += '<button data-del="'+t.id+'" style="background:none;border:none;color:var(--tx3);cursor:pointer;font-size:14px;padding:0 4px">x</button></div>';
          });
          tasksH += '</div>';
        });
      }
    } else {
      if(!tasks.length) tasksH = emptyState('No tasks in this category','');
      else tasks.forEach(function(t) {
        tasksH += '<div class="ti" data-wid="'+t.id+'">';
        tasksH += '<div class="chk'+(wDone[t.id]?' done':'')+'"></div>';
        tasksH += '<div style="flex:1"><div class="ti-text'+(wDone[t.id]?' done':'')+'">'+t.text+'</div>';
        if(t.notes) tasksH += '<div style="font-size:10px;color:var(--tx3);margin-top:2px">'+t.notes+'</div>';
        tasksH += '<div class="ti-meta">'+priTag(t.pri)+'</div></div>';
        tasksH += '<button data-del="'+t.id+'" style="background:none;border:none;color:var(--tx3);cursor:pointer;font-size:14px;padding:0 4px">x</button></div>';
      });
    }

    c.innerHTML = alertH + '<div class="tile"><div class="th"><div class="tlbl">Work Tasks &mdash; '+workTasks.filter(function(t){return !wDone[t.id]}).length+' open</div><button class="btn-p" onclick="openQA()" style="font-size:11px;padding:6px 14px">+ Add</button></div><div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:13px">'+filterH+'</div><div class="tasks">'+tasksH+'</div></div>';

    c.querySelectorAll('.cf-btn').forEach(function(el) {
      el.addEventListener('click', function(){activeCat=this.dataset.cat;draw()});
    });
    c.querySelectorAll('.ti').forEach(function(el) {
      el.addEventListener('click', function(ev) {
        if(ev.target.dataset.del) return;
        var id = parseInt(this.dataset.wid);
        wDone[id]=!wDone[id];
        this.querySelector('.chk').classList.toggle('done',!!wDone[id]);
        this.querySelector('.ti-text').classList.toggle('done',!!wDone[id]);
        updateBadges();
      });
    });
    c.querySelectorAll('[data-del]').forEach(function(el) {
      el.addEventListener('click', function(ev) {
        ev.stopPropagation();
        var id = parseInt(this.dataset.del);
        workTasks = workTasks.filter(function(t){return t.id!==id});
        draw();
        updateBadges();
      });
    });
  }
  draw();
}

// -- INBOXES --
function renderInbox(c, type) {
  var reqs = type==='work'?workReqs:personalReqs;
  var prefix = type==='work'?'w':'p';
  var pending = reqs.filter(function(r){return !reqDone[prefix+'-'+r.id]});
  var done = reqs.filter(function(r){return reqDone[prefix+'-'+r.id]});
  var col = type==='work'?'var(--purple)':'var(--pink)';

      reqH += '<div style="font-size:10px;color:var(--tx3)">'+r.when+'</div></div>';

// -- GOALS --
function renderGoals(c) {
  var cats = Object.keys(budgets);
  function draw() {
    var total = cats.reduce(function(s,ct){return s+(budgets[ct]||0)},0);
    var rows = cats.map(function(ct) {
      var h = budgets[ct]||0;
      var pct = Math.min(100,Math.round(h/20*100));
      var r = '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--brd)">';
      r += '<div style="width:85px;font-size:12px;font-weight:700;color:'+(catColors[ct]||'#888')+'">'+ct+'</div>';
      r += '<div class="bbar-bg" data-bcat="'+ct+'"><div class="bbar-fill" style="width:'+pct+'%;background:'+(catColors[ct]||'#888')+'"></div></div>';
      r += '<div style="display:flex;align-items:center;gap:5px"><input class="budget-inp" type="number" min="0" max="40" step="1" value="'+h+'" data-bcat="'+ct+'"/> <span style="font-size:10px;color:var(--tx3)">h/wk</span></div></div>';
      return r;
    }).join('');
    c.innerHTML = '<div class="tile"><div class="th"><div class="tlbl">Weekly Hour Goals</div><div style="font-size:12px;color:var(--tx2)">Total: <strong>'+total+'h</strong>/week</div></div><div style="font-size:12px;color:var(--tx2);margin-bottom:13px;padding:10px 12px;background:rgba(124,58,237,.08);border-radius:9px;border:1px solid rgba(124,58,237,.2)">Set how many hours per week you want on each area. AI will schedule time blocks in your calendar. Click a bar to add 1hr.</div>'+rows+'<div style="margin-top:14px"><button class="btn-p" onclick="alert(\'Goals saved!\')">Save &amp; auto-schedule</button></div></div>';
    c.querySelectorAll('.bbar-bg').forEach(function(el) {
      el.addEventListener('click', function(){budgets[this.dataset.bcat]=(budgets[this.dataset.bcat]||0)+1;draw()});
    });
    c.querySelectorAll('.budget-inp').forEach(function(el) {
      el.addEventListener('change', function(){budgets[this.dataset.bcat]=Math.max(0,parseInt(this.value)||0);draw()});
    });
  }
  draw();
}

// -- SECOND BRAIN --
function renderBrain(c) {
  var search = '';
  function draw() {
    var filtered = search?brainItems.filter(function(i){return i.text.toLowerCase().includes(search.toLowerCase())||i.tags.some(function(t){return t.includes(search.toLowerCase())})}):brainItems;
    var itemsH = filtered.length?filtered.map(function(item) {
      var tagsH = item.tags.map(function(t){var c=catColors[t]||'#6B7280';var bg=cb(t);return '<span style="font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600;background:'+bg+';color:'+c+'">#'+t+'</span>';}).join('');
      return '<div class="brain-item"><div style="font-size:12px;line-height:1.55">'+item.text+'</div><div style="display:flex;align-items:center;gap:5px;margin-top:7px;flex-wrap:wrap">'+tagsH+'<span style="font-size:10px;color:var(--tx3);margin-left:auto">'+item.date+'</span><button class="abtn s" data-brain-task="'+item.id+'" style="font-size:10px;padding:2px 8px">Task</button><button data-brain-del="'+item.id+'" style="background:none;border:none;color:var(--tx3);cursor:pointer;font-size:14px;padding:0 4px">x</button></div></div>';
    }).join(''):emptyState('Second brain is empty','Save ideas, links, deals, supplier contacts - anything. AI auto-tags everything.');
    c.innerHTML = '<div class="tile"><div class="th"><div class="tlbl">Second Brain</div><div style="font-size:11px;color:var(--tx3)">'+brainItems.length+' items</div></div><div style="display:flex;gap:8px;margin-bottom:12px"><input class="minput" id="brain-s" placeholder="Search everything..." value="'+search+'" style="flex:1"/><button class="btn-p" id="brain-add" style="font-size:11px;padding:7px 14px">+ Save</button></div>'+itemsH+'</div>';
    $('brain-s').addEventListener('input',function(){search=this.value;draw()});
    $('brain-add').addEventListener('click',openBrainAdd);
    c.querySelectorAll('[data-brain-task]').forEach(function(el) {
      el.addEventListener('click', function(ev) {
        ev.stopPropagation();
        var id = parseInt(this.dataset.brainTask);
        var item = brainItems.find(function(x){return x.id===id});
        if(!item) return;
        workTasks.unshift({id:Date.now(),text:item.text,cat:item.tags[0]||'lavarion',pri:'normal',notes:'From Second Brain'});
        alert('Task created!');
        updateBadges();
      });
    });
    c.querySelectorAll('[data-brain-del]').forEach(function(el) {
      el.addEventListener('click', function(ev) {
        ev.stopPropagation();
        var id = parseInt(this.dataset.brainDel);
        brainItems = brainItems.filter(function(x){return x.id!==id});
        draw();
      });
    });
  }
  draw();
}

function openBrainAdd() {
  showModal('<div class="modal-title">Save to Second Brain<button class="mx" onclick="closeModal()">x</button></div><div class="mfield"><div class="mlbl">Idea, link, deal, note, anything</div><textarea class="minput" rows="3" id="brain-txt" placeholder="Paste anything here"></textarea></div><div class="mfield"><div class="mlbl">Tags (comma separated)</div><input class="minput" id="brain-tags" placeholder="e.g. lavarion, pl-idea, supplier"/></div><div class="macts"><button class="btn-p" id="brain-save">Save</button><button class="btn-s" onclick="closeModal()">Cancel</button></div>');

function openAddDeadline() {
  showModal('<div class="modal-title">Add deadline<button class="mx" onclick="closeModal()">x</button></div><div class="mfield"><div class="mlbl">Title</div><input class="minput" id="dl-t" placeholder="e.g. VAT Return Q1"/></div><div class="m2"><div class="mfield"><div class="mlbl">Due date</div><input class="minput" type="date" id="dl-d"/></div><div class="mfield"><div class="mlbl">Type</div><select class="msel" id="dl-type"><option value="work">Work</option><option value="personal">Personal</option><option value="amazon">Sub &amp; Save (Amazon)</option></select></div></div><div class="mfield"><div class="mlbl">Hard or soft?</div><select class="msel" id="dl-hard"><option value="1">Hard deadline</option><option value="0">Soft deadline</option></select></div><div class="macts"><button class="btn-p" id="dl-save">Add</button><button class="btn-s" onclick="closeModal()">Cancel</button></div>');
  $('dl-save').addEventListener('click', function() {
    var title = $('dl-t').value.trim();
    var due = $('dl-d').value;
    if(!title||!due) return;
    var type = $('dl-type').value;
    var hard = $('dl-hard').value==='1';
    var days = Math.max(0,Math.ceil((new Date(due)-today)/86400000));
    deadlines.push({id:Date.now(),title:title,due:due,days:days,type:type==='amazon'?'work':type,hard:hard,amazon:type==='amazon'});

    nav('deadlines');

      el.addEventListener('click', function(){suppliers=suppliers.filter(function(x){return x.id!==parseInt(this.dataset.supDel)},this);draw()});
    });
    var addBtns = {'lg-add':openLGAdd,'learn-add':openLearnAdd,'bm-add':openBMAdd,'sup-add':openSupAdd};

      var el = c.querySelector('[data-'+id+']')||$(id.replace('-','_'));
      var el2 = c.querySelector('#'+id.replace('-','_'));
      var btn = c.querySelector('button[id="'+id+'"]');
      if(btn) btn.addEventListener('click',addBtns[id]);
    });
    // simpler: just attach by querying the specific button text
    c.querySelectorAll('button').forEach(function(btn) {

// -- ANALYTICS --
function renderAnalytics(c) {
  var cats = Object.keys(catColors).slice(0,8);
  var maxH = Math.max(1, cats.reduce(function(m,ct){return Math.max(m,budgets[ct]||0)},0));
  var thisWeekH = cats.map(function(ct) {
    var h = Math.round((budgets[ct]||0)*0.45);
    var barH = Math.round(h/maxH*120);
    return '<div class="bar-col"><div class="bar-val">'+h+'h</div><div class="bar" style="height:'+barH+'px;background:'+(catColors[ct]||'#888')+'"></div><div class="bar-lbl">' + ct.slice(0,5) + '</div></div>';
  }).join('');
  var lastWeekH = cats.map(function(ct) {
    var h = Math.round((budgets[ct]||0)*0.35);
    var barH = Math.round(h/maxH*120);
    return '<div class="bar-col"><div class="bar-val" style="opacity:.6">'+h+'h</div><div class="bar" style="height:'+barH+'px;background:'+(catColors[ct]||'#888')+';opacity:.45"></div><div class="bar-lbl" style="opacity:.6">' + ct.slice(0,5) + '</div></div>';
  }).join('');

}

// -- AI CHAT --
function renderAI(c) {
  function draw() {
    var msgsH = chatMsgs.map(function(m) {
      var avH = m.role==='ai'?'<div class="msg-av"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div>':'<div class="msg-av" style="background:rgba(255,255,255,.2)"></div>';
      return '<div class="msg '+m.role+'">'+avH+'<div class="msg-bub">'+m.text+'</div></div>';
    }).join('');
    var suggsH = '';
    if(chatMsgs.length<=1) {
      var suggs = ['What should I focus on today?','Plan my week','Urgent tasks?','When can I gym?','Help with a request','Analyse my schedule'];
      suggsH = '<div class="chips" style="padding:0 18px 12px">';
      suggs.forEach(function(s){suggsH+='<div class="chip" data-s="'+s+'">'+s+'</div>'});
      suggsH += '</div>';
    }
    c.innerHTML = '<div class="chat-wrap"><div class="chat-msgs" id="chat-msgs">'+msgsH+'</div>'+suggsH+'<div class="chat-inp-area"><input class="minput" id="chat-inp" placeholder="Ask anything about your day, tasks, calendar..." style="flex:1"/><button class="btn-p" id="chat-send" style="margin-left:9px">Send</button></div></div>';
    var el = $('chat-msgs');
    if(el) el.scrollTop = el.scrollHeight;
    var inp = $('chat-inp'), btn = $('chat-send');
    if(inp) { inp.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doChat(inp.value)}}); inp.focus(); }
    if(btn) btn.addEventListener('click',function(){if(inp)doChat(inp.value)});
    document.querySelectorAll('[data-s]').forEach(function(el) {
      el.addEventListener('click', function(){doChat(this.dataset.s)});
    });
  }
  function doChat(text) {
    text = text.trim();
    if(!text) return;
    chatMsgs.push({role:'user',text:text});
    chatMsgs.push({role:'ai',text:'...'});
    draw();
    fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:600,
      system:'You are the AI inside WOJ (World of Jack), Jack Bithell\'s personal command centre. He runs Bithell Distribution Ltd - Amazon FBA (OA/A2A) and Lavarion private label brand. 3 VAs, 1 UK employee. Core problem: no structure, drops tasks. Work tasks open: '+workTasks.filter(function(t){return !wDone[t.id]}).length+'. Urgent: '+workTasks.filter(function(t){return !wDone[t.id]&&t.pri==="urgent"}).length+'. Requests: '+(workReqs.filter(function(r){return !reqDone["w-"+r.id]}).length+personalReqs.filter(function(r){return !reqDone["p-"+r.id]}).length)+'. Today: '+today.toLocaleDateString('en-GB')+'. Be direct, blunt, concise. 2-4 sentences max.',
      messages:chatMsgs.filter(function(m){return m.text!=='...'}).slice(-12).map(function(m){return {role:m.role==='ai'?'assistant':'user',content:m.text}})
    })}).then(function(r){return r.json()}).then(function(data){
      chatMsgs[chatMsgs.length-1].text = data.content&&data.content[0]?data.content[0].text:'Try again.';
      draw();
    }).catch(function(){
      chatMsgs[chatMsgs.length-1].text = 'Connection error - check internet and try again.';
      draw();
    });
  }
  draw();
}

// -- QUICK ADD --
function openQA() {
  qaType = 'work';
  showModal('<div class="modal-title">Quick add<button class="mx" onclick="closeModal()">x</button></div><div style="display:flex;gap:5px;margin-bottom:14px"><button class="abtn p" id="qa-w">Work task</button><button class="abtn s" id="qa-p">Personal task</button><button class="abtn s" id="qa-e">Calendar event</button></div><div class="mfield"><div class="mlbl" id="qa-lbl">Task</div><input class="minput" id="qa-text" placeholder="What needs to be done?"/></div><div class="m2"><div class="mfield"><div class="mlbl">Category</div><select class="msel" id="qa-cat"><option value="lavarion">Lavarion</option><option value="oa">OA/A2A</option><option value="sourcing">Sourcing</option><option value="team">Team</option><option value="admin">Admin</option><option value="discord">Discord</option><option value="learning">Learning</option></select></div><div class="mfield"><div class="mlbl">Priority</div><select class="msel" id="qa-pri"><option value="urgent">Urgent</option><option value="high">High</option><option value="normal" selected>Normal</option></select></div></div><div id="qa-evt-f" style="display:none"><div class="m2"><div class="mfield"><div class="mlbl">Date</div><input class="minput" type="date" id="qa-date" value="'+todayStr+'"/></div><div class="mfield"><div class="mlbl">Time</div><input class="minput" type="time" id="qa-time" value="09:00"/></div></div></div><div class="mfield"><div class="mlbl">Notes (optional)</div><input class="minput" id="qa-notes" placeholder="Context, links, prices..."/></div><div class="macts"><button class="btn-p" id="qa-save">Add</button><button class="btn-s" onclick="closeModal()">Cancel</button></div>');
  $('qa-text').focus();
  $('qa-text').addEventListener('keydown', function(e){if(e.key==='Enter')saveQA()});
  function setQAType(t) {
    qaType = t;
    ['w','p','e'].forEach(function(x){var b=$('qa-'+x);if(b)b.className='abtn s'});
    var map = {work:'w',personal:'p',event:'e'};
    $('qa-'+map[t]).className = 'abtn p';
    $('qa-lbl').textContent = t==='event'?'Event title':'Task';
    $('qa-evt-f').style.display = t==='event'?'block':'none';
    if(t==='personal') $('qa-cat').innerHTML = '<option value="personal">Personal</option><option value="health">Health</option><option value="social">Social</option><option value="home">Home</option><option value="goals">Goals</option>';
    else if(t==='work') $('qa-cat').innerHTML = '<option value="lavarion">Lavarion</option><option value="oa">OA/A2A</option><option value="sourcing">Sourcing</option><option value="team">Team</option><option value="admin">Admin</option><option value="discord">Discord</option><option value="learning">Learning</option>';
    else $('qa-cat').innerHTML = '<option value="lavarion">Work</option><option value="health">Health</option><option value="personal">Personal</option><option value="social">Social</option>';
  }
  $('qa-w').addEventListener('click',function(){setQAType('work')});
  $('qa-p').addEventListener('click',function(){setQAType('personal')});
  $('qa-e').addEventListener('click',function(){setQAType('event')});
  $('qa-save').addEventListener('click',saveQA);
}

function saveQA() {
  var text = $('qa-text')&&$('qa-text').value.trim();
  if(!text) return;
  var cat = $('qa-cat')&&$('qa-cat').value;
  var pri = $('qa-pri')&&$('qa-pri').value||'normal';
  var notes = $('qa-notes')&&$('qa-notes').value||'';
  if(qaType==='work') workTasks.unshift({id:Date.now(),text:text,cat:cat,pri:pri,notes:notes});
  else if(qaType==='personal') personalTasks.unshift({id:Date.now(),text:text,cat:cat,pri:pri,notes:notes});
  else {
    var date = $('qa-date')&&$('qa-date').value||todayStr;
    var time = $('qa-time')&&$('qa-time').value||'09:00';
    var isP = ['personal','health','social','home'].indexOf(cat)>-1;
    events.push({id:Date.now(),date:date,title:text,time:time,dur:60,cat:cat,type:isP?'personal':'work'});
  }
  closeModal();
  updateBadges();
  var cur = document.querySelector('.nb.on');
  nav(cur?cur.id.replace('nb-',''):'dashboard');
}

// -- BRAIN DUMP --
function openBrainDump() {
  showModal('<div class="modal-title">Brain dump<button class="mx" onclick="closeModal()">x</button></div><div style="font-size:12px;color:var(--tx2);margin-bottom:12px">Quick - what\'s on your mind? Dump it before it\'s gone.</div><div class="mfield"><textarea class="minput" rows="4" id="bd-text" placeholder="Anything - idea, task, worry, deal, something to remember..." style="resize:vertical"></textarea></div><div class="macts"><button class="btn-p" id="bd-brain">Save to Brain</button><button class="abtn s" id="bd-work">Work task</button><button class="abtn s" id="bd-pers">Personal task</button><button class="btn-s" onclick="closeModal()">Cancel</button></div>');
  $('bd-text').focus();
  function saveDump(dest) {
    var text = $('bd-text').value.trim();
    if(!text) return;
    if(dest==='work') workTasks.unshift({id:Date.now(),text:text,cat:'lavarion',pri:'normal',notes:'Brain dump'});
    else if(dest==='personal') personalTasks.unshift({id:Date.now(),text:text,cat:'personal',pri:'normal',notes:'Brain dump'});
    else brainItems.unshift({id:Date.now(),text:text,tags:['brain-dump'],date:'Just now'});
    closeModal();
    updateBadges();
  }
  $('bd-brain').addEventListener('click',function(){saveDump('brain')});
  $('bd-work').addEventListener('click',function(){saveDump('work')});
  $('bd-pers').addEventListener('click',function(){saveDump('personal')});
}
